spring:
  application:
    name: contractguard

  datasource:
    url: jdbc:postgresql://localhost:5432/contractguard
    username: contractguard
    password: contractguard
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: ContractGuardPool
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true
    out-of-order: false

server:
  port: 8080
  servlet:
    context-path: /

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha

logging:
  level:
    root: INFO
    br.com.contractguard: DEBUG

# ─────────────────────────────────────────────
# CORS — override with CORS_ALLOWED_ORIGINS env-var in production
# Multiple origins must be comma-separated: https://app.example.com,https://www.example.com
# ─────────────────────────────────────────────
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}
