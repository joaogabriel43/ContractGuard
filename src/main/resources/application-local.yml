# ============================================================
# Local development overrides — NOT for production use
# Activate with: -Dspring-boot.run.profiles=local
# ============================================================

spring:
  jpa:
    show-sql: true

  devtools:
    restart:
      enabled: true
    livereload:
      enabled: true

logging:
  level:
    root: INFO
    br.com.contractguard: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
